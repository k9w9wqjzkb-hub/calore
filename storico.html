<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Storico Letture</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">🔥</div>
    <span class="app-name">Calore</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
    <button class="icon-btn" onclick="location.href='caloriferi.html'">♨️</button>
    <button class="icon-btn active" onclick="location.href='storico.html'">🕘</button>
    <button class="icon-btn" onclick="location.href='grafici.html'">📊</button>
    <button class="icon-btn" onclick="location.href='ripartizione.html'">📋</button>
  </div>
</header>

<main class="container with-topbar">

<h2>📖 Storico letture</h2>
<p>Consulta, modifica o elimina le letture registrate.</p>

<div class="filter">
  <select id="filtroCalorifero">
    <option value="">Tutti i caloriferi</option>
  </select>
</div>

<div class="storico-wrapper">
  <div class="list-header">
    <div>Data</div>
    <div>Stanza</div>
    <div class="value-col">Valore</div>
    <div>Azioni</div>
  </div>
  <div class="list-card"></div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <span>Totale Letture</span>
    <b id="statTotaleLetture">0</b>
  </div>
  <div class="stat-card">
    <span>Consumo Totale</span>
    <b id="statConsumoTotale">0</b>
  </div>
  <div class="stat-card">
    <span>Media</span>
    <b id="statMedia">0</b>
  </div>
  <div class="stat-card">
    <span>Ultima</span>
    <b id="statUltima">0</b>
  </div>
</div>

</main>

<!-- MODALE MODIFICA LETTURA -->
<div id="modalModificaLettura" class="modal hidden">
  <div class="modal-content">
    <h3>✏️ Modifica Lettura</h3>
    <label>Data</label>
    <input type="date" id="editData">
    <label>Stanza</label>
    <select id="editStanza"></select>
    <label>Valore</label>
    <input type="number" id="editValore">
    <div class="modal-actions">
      <button class="secondary" onclick="chiudiModificaLettura()">Annulla</button>
      <button class="primary" onclick="salvaModificaLettura()">Salva</button>
    </div>
  </div>
</div>

<!-- OVERLAY CONFERMA -->
<div id="overlayConferma" class="sheet-overlay hidden"></div>

<!-- MODALE CONFERMA -->
<div id="modalConferma" class="modal hidden">
  <div class="modal-content">

    <h3 id="titoloConferma"></h3>

    <div id="testoConferma"></div>

    <div class="modal-actions">
      <button class="secondary" onclick="chiudiConferma()">
        Annulla
      </button>

      <button id="btnConferma" class="primary">
        Elimina
      </button>
    </div>

  </div>
</div>

<script src="version.js"></script>
<script src="app.js"></script>
<script src="storico.js"></script>

</body>
</html>

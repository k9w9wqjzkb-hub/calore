<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<!-- 🔑 QUESTO È FONDAMENTALE -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="modals.css">
<link rel="apple-touch-icon" href="icons/caloriferi-512.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caloriferi">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">--->
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">🔥</div>
    <span class="app-name">Calore</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn active" onclick="location.href='index.html'">🏠</button>
    <button class="icon-btn" onclick="location.href='caloriferi.html'">♨️</button>
    <button class="icon-btn" onclick="location.href='storico.html'">🕘</button>
    <button class="icon-btn" onclick="location.href='grafici.html'">📊</button>
    <button class="icon-btn" onclick="location.href='ripartizione.html'">📋</button>
  </div>
</header>

<main class="container">
    
    <div class="card-anno">
        <span class="label">🔥 Anno termico</span>
        <span class="value" id="annoTermicoAttivo"></span>
    </div>

  <!-- HEADER DASHBOARD -->

  <div class="dashboard-header">
    <div class="dashboard-title">
      <h1>Dashboard</h1>
      <p>Monitora i consumi dei tuoi caloriferi</p>
    </div>
    <div class="dashboard-action">
      <button class="btn-pill" onclick="apriLetturaSheet()">📝 Registra lettura mensile</button>
    </div>
  </div>

  <!-- CARDS TOTALI -->

  <div class="card card-total">
    <div class="card-top">
      <span>Consumo Totale</span>
      <div class="icon">🔥</div>
    </div>
    <div class="big-number" id="totaleConsumi">0</div>
    <span class="unit">unità</span>
  </div>

  <div class="card card-small">
    <div>
      <span class="label">Caloriferi</span>
      <div class="small-number" id="numeroCaloriferi">0</div>
    </div>
    <div class="icon-gray">♨️</div>
  </div>

  <div class="card card-small">
    <div>
      <span class="label">Letture</span>
      <div class="small-number" id="numeroLetture">0</div>
    </div>
    <div class="icon-gray">📄</div>
  </div>

  <!-- CARD GRAFICO CONSUMI-->
  <div class="card">
    <h3>Andamento Consumi Mensili</h3>
    <canvas id="consumiChart" height="180"></canvas>
  </div>

  <!-- CARD CONSUMI PER STANZA -->
  <div class="card" id="consumiPerStanza">
    <h3>Consumi per Stanza</h3>
  </div>

  <!-- BACKUP -->

  <div class="card">
    <h3>Backup dati</h3>
    <button class="btn-pill full" onclick="backupDB()">
      💾 Esporta Backup
    </button>
    <br><br>
    <input type="file" id="restoreFile" accept=".json" style="display:none"
      onchange="ripristinaDB(this.files[0])">
    <button class="btn-pill full" style="background:#555"
      onclick="document.getElementById('restoreFile').click()">
      ♻️ Ripristina Backup
    </button>
  </div>
</main>

<!-- OVERLAY NUOVA LETTURA -->
<div id="sheetOverlayLettura"
     class="sheet-overlay hidden"
     onclick="chiudiLetturaSheet()"></div>

<!-- SHEET NUOVA LETTURA -->
<div id="letturaSheet" class="sheet hidden">
  <div class="sheet-header">
    <h2>Nuova Lettura</h2>
    <button class="close-btn"
            onclick="chiudiLetturaSheet()">✕</button>
  </div>
  <div class="sheet-content">
    <label>Calorifero</label>
    <select id="letturaCalorifero"></select>

<div class="ultima-lettura">

    <div class="ultima-title">
        Ultima lettura registrata
    </div>

    <div class="ultima-data" id="ultimaLetturaData">
        --
    </div>

    <div class="ultima-display">
        <span>📟 Display</span>
        <strong id="ultimaLetturaValore">--</strong>
    </div>

</div>

    <label>Valore</label>
    <input
       type="number" 
       id="letturaValore" 
       placeholder="Es: 123">

    <label>Data</label>
    <input type="date" id="letturaData">

    <div class="sheet-actions">

    <button class="btn-secondary" onclick="chiudiLetturaSheet()">
        Annulla
    </button>

    <button class="btn-pill" onclick="salvaLettura()">
        Registra
    </button>

</div>

<!-- JS -->
<script src="version.js"></script>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="modals.js"></script>
<script src="dashboard.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker attivo su:', reg.scope))
        .catch(err => console.error('Errore SW:', err));
    });
  }
</script>
</body>
</html>

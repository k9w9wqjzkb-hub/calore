<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <!-- 🔑 QUESTO È FONDAMENTALE -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
      <title>Calore 2.0</title>
        <link rel="preconnect" href="https://cdn.jsdelivr.net">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="modals.css">
<link rel="apple-touch-icon" href="icons/caloriferi-512.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caloriferi">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">--->
</head>
<body>

<header class="app-header">

    <div class="app-title">
        <span>🔥</span>
        <span>Calore</span>
    </div>

    <nav class="nav-icons">

    <a href="index.html" class="active" title="Dashboard">
        <i class="bi bi-house-door"></i>
    </a>

    <a href="caloriferi.html" title="Caloriferi">
        <i class="bi bi-thermometer-half"></i>
    </a>

    <a href="storico.html" title="Storico">
        <i class="bi bi-clock-history"></i>
    </a>

    <a href="grafici.html" title="Grafici">
        <i class="bi bi-bar-chart"></i>
    </a>

    <a href="ripartizione.html" title="Ripartizione">
        <i class="bi bi-clipboard-data"></i>
    </a>

    <a href="impostazioni.html" title="Impostazioni">
        <i class="bi bi-gear"></i>
    </a>

</nav>

</header>

  <main class="container">
    
    <div class="card-anno">
        <span class="label">🔥 Anno termico</span>
        <span class="value" id="annoTermicoAttivo"></span>
    </div>

  <!-- HEADER DASHBOARD -->

    <div class="dashboard-action">
      <button class="btn-pill" onclick="apriLetturaSheet()">
        📝 Registra lettura mensile
      </button>
    </div>

  <!-- CARDS TOTALI -->
    <div class="stats-grid">

    <!-- Consumo Totale -->
    <div class="card card-total">
        <div class="card-top">
            <span>Consumo Totale</span>
            <div class="icon">
              <i class="bi bi-fire"></i>
            </div>
        </div>

        <div class="big-number" id="totaleConsumi">0</div>
        <span class="unit">unità</span>
    </div>

    <!-- Caloriferi -->
    <div class="card card-small">
        <div>
            <span class="label">Caloriferi</span>
            <div class="small-number" id="numeroCaloriferi">0</div>
        </div>

        <div class="icon-gray">
          <i class="bi bi-thermometer-half"></i>
        </div>
    </div>

    <!-- Letture -->
    <div class="card card-small">
        <div>
            <span class="label">Letture</span>
            <div class="small-number" id="numeroLetture">0</div>
        </div>

        <div class="icon-gray">
          <i class="bi bi-journal-text"></i>
        </div>
    </div>

</div>

  <!-- CARD GRAFICO CONSUMI-->
    <div class="card">
      <h3>Andamento Consumi Mensili</h3>
      <canvas id="consumiChart" height="180"></canvas>
    </div>

  <!-- CARD CONSUMI PER STANZA -->
    <div class="card" id="consumiPerStanza">
      <h3>Consumi per Stanza</h3>
    </div>

  <!-- BACKUP -->

  <div class="card">
    <h3>Backup dati</h3>
    <button class="btn-pill full" onclick="backupDB()">
      💾 Esporta Backup
    </button>
    <br><br>
    <input type="file" id="restoreFile" accept=".json" style="display:none"
      onchange="ripristinaDB(this.files[0])">
    <button class="btn-pill full" style="background:#555"
      onclick="document.getElementById('restoreFile').click()">
      ♻️ Ripristina Backup
    </button>
  </div>
</main>

<!-- OVERLAY NUOVA LETTURA -->
<div id="sheetOverlayLettura"
     class="sheet-overlay hidden"
     onclick="chiudiLetturaSheet()"></div>

  <!-- SHEET NUOVA LETTURA -->
  <div id="letturaSheet" class="sheet hidden">
  <div class="sheet-header">
    <h2>Nuova Lettura</h2>
    <button class="close-btn"
            onclick="chiudiLetturaSheet()">✕</button>
  </div>
  <div class="sheet-content">
    <label>Calorifero</label>
    <select id="letturaCalorifero"></select>

  <div class="ultima-lettura">

    <div class="ultima-title">
        Ultima lettura registrata
    </div>

    <div class="ultima-data" id="ultimaLetturaData">
        --
    </div>

    <div class="ultima-display">
        <span>📟 Display</span>
        <strong id="ultimaLetturaValore">--</strong>
    </div>

</div>

    <label>Valore</label>
    <input
       type="number" 
       id="letturaValore" 
       placeholder="Es: 123">

    <label>Data</label>
    <input type="date" id="letturaData">

    <div class="sheet-actions">

    <button class="btn-secondary" onclick="chiudiLetturaSheet()">
        Annulla
    </button>

    <button class="btn-pill" onclick="salvaLettura()">
        Registra
    </button>
    </div> <!-- sheet-actions -->

  </div> <!-- sheet-actions -->

</div> <!-- letturaSheet -->

<!-- JS -->
<script src="version.js"></script>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="modals.js"></script>
<script src="dashboard.js"></script>


<script>
window.addEventListener("load", () => {

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('Service Worker attivo su:', reg.scope))
            .catch(err => console.error('Errore SW:', err));
    }

});
</script>

</body>
</html>
